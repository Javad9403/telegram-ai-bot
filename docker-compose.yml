version: "3.8"

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WEBHOOK_URL=
    ports:
      - "${WEBHOOK_PORT:-8443}:8443"

volumes:
  redis_data:
